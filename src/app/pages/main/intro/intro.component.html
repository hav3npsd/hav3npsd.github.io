<div class="content">
  <div class="rounded block name">
    <div class="title"><p>Hey, I'm hav3n️</p></div>
    <div class="description">
      <p class="line-text">
        Design. Junior UI/UX, Web-design & Digital Art <br />
        Web-Development. Junior Frontend Dev.
      </p>
    </div>
  </div>
  <div class="rounded block achievements clickable">
    <div class="title"><p>Achievements</p></div>
    <div class="description">
      <p>Roadmap</p>
      <div class="arrow">
        <svg
          width="18"

  </div>
  <div class="rounded block work clickable">
    <div class="image">
      <img
        [src]="icons.razoomart.link"
        [alt]="icons.razoomart.description"
        draggable="false"
      />
    </div>
    <div class="description">
      <p>Place of work</p>
      <div class="arrow">
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"

          xmlns="http://www.w3.org/2000/svg"

    </div>
  </div>
  <div class="rounded block projects clickable">
    <div class="title">
      <p>Projects</p>
      <img [src]="icons.sparkles.link" [alt]="icons.sparkles.description" />
    </div>
    <div class="description">
      <p>Portfolio</p>
      <div class="arrow">
        <svg
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"

  <div class="rounded block youtube clickable">
    <a href="https://www.youtube.com/@hav3nwork/featured" target="_blank">
      <div class="image">
        <img
          [src]="icons.youtube.link"
          [alt]="icons.youtube.description"
          draggable="false"
        />
      </div>
      <div class="description">
        <p>YouTube channel</p>
        <div class="arrow">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"

    <div class="title">

    </div>
    <div class="description">
      <div class="list">
        <div class="item rounded">
          <p>UX<br />Research</p>
        </div>
        <div class="item rounded">
          <p>UI<br />Design</p>
        </div>
        <div class="item rounded">
          <p>Digital<br />art</p>
        </div>
      </div>
    </div>
  </div>
</div>
